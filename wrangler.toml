name = "jimmypark-net"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

# KV namespace for the portfolio CMS (content document + media index).
# Create with:  wrangler kv namespace create JP_KV
# then paste the id below.
[[kv_namespaces]]
binding = "JP_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets (set in Cloudflare Pages → Settings → Environment variables):
#   TOTP_SECRET   base32 secret shared with your authenticator app (admin login)
